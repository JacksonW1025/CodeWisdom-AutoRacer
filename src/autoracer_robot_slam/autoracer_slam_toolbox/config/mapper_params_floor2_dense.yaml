# SLAM Toolbox dense 2D mapping profile for floor-2 loop mapping.
#
# Intent:
# - Keep the stage-3 canonical 2D SLAM stack: /point_cloud_raw -> /scan -> slam_toolbox.
# - Insert scans more densely than mapper_params_online_sync.yaml while staying within the
#   ThinkPad live-mapping compute budget observed during floor-2 tests.
# - Use this profile for deliberate manual mapping in weak-feature corridor / open areas.
#
# This is not a 3D point-cloud matching profile. Raw point-cloud capture for later 3D stages
# should be recorded in a separate bag when needed.

slam_toolbox:
  ros__parameters:

    # === Solver ===
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # === ROS frames and topics ===
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    mode: mapping

    # === Mapping baseline ===
    debug_logging: false
    throttle_scans: 2
    transform_publish_period: 0.02
    map_update_interval: 2.0
    resolution: 0.05
    max_laser_range: 20.0
    minimum_time_interval: 0.20
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # === Balanced dense scan matching ===
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.18
    minimum_travel_heading: 0.12
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 12.0
    link_match_minimum_response_fine: 0.12
    link_scan_maximum_distance: 1.0

    # === Loop closure ===
    do_loop_closing: true
    loop_search_maximum_distance: 4.0
    loop_match_minimum_chain_size: 8
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.30
    loop_match_minimum_response_fine: 0.40

    # === Correlation search ===
    correlation_search_space_dimension: 0.7
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.05

    # === Loop search ===
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # === Matcher penalties ===
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
